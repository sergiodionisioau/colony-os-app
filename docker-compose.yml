version: '3.8'

services:
  colony-os:
    build: .
    container_name: colony-os-app
    ports:
      - "8080:8080"
    environment:
      - APP_PORT=8080
      - DATABASE_PATH=/app/data/colony_os_tasks.db
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 3s
      retries: 3

  # Optional: Cloudflare Tunnel for secure access
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: colony-os-tunnel
    command: tunnel --no-autoupdate run --token ${CF_TUNNEL_TOKEN}
    restart: unless-stopped
    depends_on:
      - colony-os
    profiles:
      - tunnel
