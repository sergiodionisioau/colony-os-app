<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colony OS | Neural Interface</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0a0f 0%, #0d1117 50%, #0a0a0f 100%);
            min-height: 100vh;
            overflow-x: hidden;
            color: #e6edf3;
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        #particles-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .content {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            text-align: center;
        }

        .header {
            margin-bottom: 2rem;
        }

        h1 {
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: 700;
            background: linear-gradient(135deg, #00ff88 0%, #a855f7 50%, #00ff88 100%);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 5s ease infinite;
            text-shadow: 0 0 60px rgba(0, 255, 136, 0.3);
            letter-spacing: -2px;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .subtitle {
            font-size: clamp(1rem, 3vw, 1.5rem);
            color: #8b949e;
            margin-top: 0.5rem;
            font-weight: 300;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        .stats-container {
            display: flex;
            gap: 3rem;
            margin-top: 3rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .stat-box {
            background: rgba(13, 17, 23, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 255, 136, 0.2);
            border-radius: 16px;
            padding: 1.5rem 2.5rem;
            min-width: 150px;
            transition: all 0.3s ease;
        }

        .stat-box:hover {
            border-color: rgba(0, 255, 136, 0.5);
            transform: translateY(-5px);
            box-shadow: 0 10px 40px rgba(0, 255, 136, 0.2);
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: #00ff88;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
        }

        .stat-label {
            font-size: 0.875rem;
            color: #8b949e;
            margin-top: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .github-link {
            margin-top: 3rem;
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            padding: 1rem 2rem;
            background: linear-gradient(135deg, rgba(0, 255, 136, 0.1), rgba(168, 85, 247, 0.1));
            border: 1px solid rgba(0, 255, 136, 0.3);
            border-radius: 50px;
            color: #00ff88;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .github-link:hover {
            background: linear-gradient(135deg, rgba(0, 255, 136, 0.2), rgba(168, 85, 247, 0.2));
            border-color: rgba(0, 255, 136, 0.6);
            transform: translateY(-2px);
            box-shadow: 0 5px 30px rgba(0, 255, 136, 0.3);
        }

        .github-link svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        .pulse-ring {
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid #00ff88;
            border-radius: 50%;
            animation: pulse 2s ease-out infinite;
            opacity: 0;
        }

        @keyframes pulse {
            0% { transform: scale(0.5); opacity: 1; }
            100% { transform: scale(3); opacity: 0; }
        }

        @media (max-width: 768px) {
            .stats-container {
                gap: 1.5rem;
            }
            
            .stat-box {
                padding: 1rem 1.5rem;
                min-width: 120px;
            }
            
            .stat-value {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <canvas id="particles-canvas"></canvas>
    
    <div class="content">
        <div class="header">
            <h1>Colony OS</h1>
            <p class="subtitle">Distributed Intelligence Network</p>
        </div>
        
        <div class="stats-container">
            <div class="stat-box">
                <div class="stat-value" id="node-count">0</div>
                <div class="stat-label">Active Nodes</div>
            </div>
            <div class="stat-box">
                <div class="stat-value" id="connection-count">0</div>
                <div class="stat-label">Connections</div>
            </div>
            <div class="stat-box">
                <div class="stat-value" id="uptime">00:00:00</div>
                <div class="stat-label">Uptime</div>
            </div>
        </div>
        
        <a href="https://github.com/colony-os" class="github-link" target="_blank" rel="noopener">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
            </svg>
            View on GitHub
        </a>
    </div>

    <script>
        // Neural Network Visualization using D3.js
        const width = window.innerWidth;
        const height = window.innerHeight;
        const nodeCount = 35;
        
        // Create SVG
        const svg = d3.select("#canvas-container")
            .append("svg")
            .attr("width", width)
            .attr("height", height)
            .attr("viewBox", [0, 0, width, height])
            .style("position", "absolute")
            .style("top", 0)
            .style("left", 0);

        // Define gradients
        const defs = svg.append("defs");
        
        // Glow filter
        const filter = defs.append("filter")
            .attr("id", "glow")
            .attr("x", "-50%")
            .attr("y", "-50%")
            .attr("width", "200%")
            .attr("height", "200%");
        
        filter.append("feGaussianBlur")
            .attr("stdDeviation", "3")
            .attr("result", "coloredBlur");
        
        const feMerge = filter.append("feMerge");
        feMerge.append("feMergeNode").attr("in", "coloredBlur");
        feMerge.append("feMergeNode").attr("in", "SourceGraphic");

        // Node gradient
        const nodeGradient = defs.append("radialGradient")
            .attr("id", "nodeGradient")
            .attr("cx", "30%")
            .attr("cy", "30%");
        nodeGradient.append("stop").attr("offset", "0%").attr("stop-color", "#ffffff");
        nodeGradient.append("stop").attr("offset", "50%").attr("stop-color", "#00ff88");
        nodeGradient.append("stop").attr("offset", "100%").attr("stop-color", "#a855f7");

        // Generate nodes
        const nodes = Array.from({ length: nodeCount }, (_, i) => ({
            id: i,
            x: Math.random() * width,
            y: Math.random() * height,
            vx: (Math.random() - 0.5) * 0.5,
            vy: (Math.random() - 0.5) * 0.5,
            radius: Math.random() * 8 + 4,
            pulsePhase: Math.random() * Math.PI * 2
        }));

        // Generate connections based on distance
        const maxDistance = 200;
        const links = [];
        
        for (let i = 0; i < nodes.length; i++) {
            for (let j = i + 1; j < nodes.length; j++) {
                const dx = nodes[i].x - nodes[j].x;
                const dy = nodes[i].y - nodes[j].y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < maxDistance && Math.random() > 0.6) {
                    links.push({
                        source: nodes[i],
                        target: nodes[j],
                        strength: 1 - dist / maxDistance
                    });
                }
            }
        }

        // Create link elements
        const linkGroup = svg.append("g").attr("class", "links");
        const linksSelection = linkGroup.selectAll("line")
            .data(links)
            .join("line")
            .attr("stroke", "#00ff88")
            .attr("stroke-opacity", d => d.strength * 0.4)
            .attr("stroke-width", d => d.strength * 2)
            .style("filter", "url(#glow)");

        // Create node elements
        const nodeGroup = svg.append("g").attr("class", "nodes");
        const nodesSelection = nodeGroup.selectAll("circle")
            .data(nodes)
            .join("circle")
            .attr("r", d => d.radius)
            .attr("fill", "url(#nodeGradient)")
            .style("filter", "url(#glow)")
            .style("cursor", "pointer");

        // Animation loop
        let time = 0;
        function animate() {
            time += 0.01;
            
            // Update node positions
            nodes.forEach(node => {
                node.x += node.vx;
                node.y += node.vy;
                
                // Bounce off walls
                if (node.x < 0 || node.x > width) node.vx *= -1;
                if (node.y < 0 || node.y > height) node.vy *= -1;
                
                // Keep in bounds
                node.x = Math.max(20, Math.min(width - 20, node.x));
                node.y = Math.max(20, Math.min(height - 20, node.y));
                
                // Add subtle floating motion
                node.x += Math.sin(time + node.pulsePhase) * 0.3;
                node.y += Math.cos(time + node.pulsePhase) * 0.3;
            });

            // Update node positions
            nodesSelection
                .attr("cx", d => d.x)
                .attr("cy", d => d.y)
                .attr("r", d => d.radius + Math.sin(time * 2 + d.pulsePhase) * 2);

            // Update link positions
            linksSelection
                .attr("x1", d => d.source.x)
                .attr("y1", d => d.source.y)
                .attr("x2", d => d.target.x)
                .attr("y2", d => d.target.y)
                .attr("stroke-opacity", d => d.strength * (0.3 + Math.sin(time * 3) * 0.1));

            requestAnimationFrame(animate);
        }

        animate();

        // Particle System
        const particleCanvas = document.getElementById('particles-canvas');
        const ctx = particleCanvas.getContext('2d');
        
        function resizeCanvas() {
            particleCanvas.width = window.innerWidth;
            particleCanvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        class Particle {
            constructor() {
                this.reset();
            }
            
            reset() {
                this.x = Math.random() * particleCanvas.width;
                this.y = Math.random() * particleCanvas.height;
                this.size = Math.random() * 2 + 0.5;
                this.speedX = (Math.random() - 0.5) * 0.5;
                this.speedY = (Math.random() - 0.5) * 0.5;
                this.opacity = Math.random() * 0.5 + 0.2;
                this.color = Math.random() > 0.5 ? '#00ff88' : '#a855f7';
            }
            
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                
                if (this.x < 0 || this.x > particleCanvas.width) this.speedX *= -1;
                if (this.y < 0 || this.y > particleCanvas.height) this.speedY *= -1;
                
                this.opacity += (Math.random() - 0.5) * 0.02;
                this.opacity = Math.max(0.1, Math.min(0.6, this.opacity));
            }
            
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.opacity;
                ctx.fill();
                
                // Glow effect
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.globalAlpha = 1;
            }
        }

        const particles = Array.from({ length: 50 }, () => new Particle());

        function animateParticles() {
            ctx.clearRect(0, 0, particleCanvas.width, particleCanvas.height);
            
            particles.forEach(particle => {
                particle.update();
                particle.draw();
            });
            
            requestAnimationFrame(animateParticles);
        }

        animateParticles();

        // Stats Counter Animation
        function animateValue(id, start, end, duration) {
            const obj = document.getElementById(id);
            const range = end - start;
            const minTimer = 50;
            let stepTime = Math.abs(Math.floor(duration / range));
            stepTime = Math.max(stepTime, minTimer);
            let startTime = new Date().getTime();
            let endTime = startTime + duration;
            let timer;

            function run() {
                let now = new Date().getTime();
                let remaining = Math.max((endTime - now) / duration, 0);
                let value = Math.round(end - (remaining * range));
                obj.innerHTML = value;
                if (value == end) {
                    clearInterval(timer);
                }
            }
            
            timer = setInterval(run, stepTime);
            run();
        }

        // Animate stats on load
        setTimeout(() => {
            animateValue("node-count", 0, nodeCount, 2000);
            animateValue("connection-count", 0, links.length, 2000);
        }, 500);

        // Uptime counter
        let seconds = 0;
        function updateUptime() {
            seconds++;
            const hrs = Math.floor(seconds / 3600).toString().padStart(2, '0');
            const mins = Math.floor((seconds % 3600) / 60).toString().padStart(2, '0');
            const secs = (seconds % 60).toString().padStart(2, '0');
            document.getElementById('uptime').textContent = `${hrs}:${mins}:${secs}`;
        }
        setInterval(updateUptime, 1000);

        // Handle window resize for D3
        window.addEventListener('resize', () => {
            const newWidth = window.innerWidth;
            const newHeight = window.innerHeight;
            svg.attr("width", newWidth).attr("height", newHeight);
        });

        // Interactive node hover
        nodesSelection.on("mouseover", function(event, d) {
            d3.select(this)
                .transition()
                .duration(200)
                .attr("r", d.radius * 1.5);
        }).on("mouseout", function(event, d) {
            d3.select(this)
                .transition()
                .duration(200)
                .attr("r", d.radius);
        });
    </script>
</body>
</html>
